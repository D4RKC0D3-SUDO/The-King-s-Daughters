<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | King's Daughters Africa</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hero Banner -->
  <section class="hero gallery-hero">
    <div class="hero-text">
      <h1>Gallery</h1>
      <p>Memories from past King's Daughters conferences and gatherings.</p>
    </div>
  </section>

  <!-- Gallery Grid -->
  <section class="gallery-grid">
    <h2>Our Journey Across Africa</h2>
    <div class="grid">
      <div class="gallery-item">
        <img src="images/tanzania2022.jpg" alt="Tanzania 2022 Conference">
      </div>
      <div class="gallery-item">
        <img src="images/kenya2023.jpg" alt="Kenya 2023 Conference">
      </div>
      <div class="gallery-item">
        <img src="images/southafrica2024.jpg" alt="South Africa 2024 Conference">
      </div>
      <div class="gallery-item">
        <img src="images/uganda2025.jpg" alt="Uganda 2025 Conference">
      </div>
      <!-- Add remaining 20+ images here -->
    </div>
  </section>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
    <div id="caption"></div>
  </div>

  <footer>
    <p>&copy; 2026 King's Daughters Africa | All Rights Reserved</p>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
