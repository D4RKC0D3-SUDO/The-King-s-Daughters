<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | King's Daughters Africa</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Hero Banner -->
  <section class="hero contact-hero">
    <div class="hero-text">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you.</p>
    </div>
  </section>

  <!-- Contact Info -->
  <section class="contact-info">
    <h2>Get in Touch</h2>
    <p>Email: info@kingsdaughtersafrica.org</p>
    <p>Phone: +254 700 000 000</p>
    <p>Follow us on social media:</p>
    <div class="social-links">
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="#">YouTube</a>
    </div>
  </section>

  <!-- Contact Form -->
  <section class="contact-form">
    <h2>Send a Message</h2>
    <form action="https://formsubmit.co/YOUR_EMAIL" method="POST">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <textarea name="message" placeholder="Your Message" required></textarea>
      <button type="submit" class="btn">Send</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 King's Daughters Africa | All Rights Reserved</p>
  </footer>
</body>
</html>
